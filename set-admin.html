<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緊急提權 — 設定管理員</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #eeeae4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .box {
    background: #1c1917;
    color: #e7e5e4;
    border-radius: 14px;
    padding: 36px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 64px rgba(0,0,0,.35);
  }
  .warn-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #d97706;
    background: rgba(217,119,6,.15);
    border: 1px solid rgba(217,119,6,.3);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 12px; color: #78716c; margin-bottom: 28px; line-height: 1.6; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; color: #a8a29e; margin-bottom: 6px; letter-spacing: .5px; }
  .field input {
    width: 100%;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 6px;
    color: #fff;
    padding: 11px 13px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
    transition: .15s;
  }
  .field input:focus { border-color: #b45309; background: rgba(255,255,255,.1); box-shadow: 0 0 0 3px rgba(180,83,9,.2); }
  .btn {
    width: 100%;
    background: #b45309;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: .15s;
    margin-top: 4px;
  }
  .btn:hover { background: #d97706; }
  .btn:disabled { background: #44403c; cursor: not-allowed; }
  #msg {
    margin-top: 16px;
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 7px;
    display: none;
    line-height: 1.6;
  }
  .ok  { background: rgba(5,150,105,.15); color: #34d399; border: 1px solid rgba(52,211,153,.25); }
  .err { background: rgba(220,38,38,.15); color: #fca5a5; border: 1px solid rgba(220,38,38,.25); }
  .uid-display {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 7px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    font-size: 11px;
    color: #78716c;
    display: none;
  }
  .uid-display span { color: #d6d3d1; font-family: monospace; font-size: 12px; word-break: break-all; }
  .step { font-size: 11px; color: #57534e; margin-bottom: 20px; padding: 10px 14px; border-radius: 6px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); line-height: 1.8; }
  .step b { color: #a8a29e; }
  .divider { height: 1px; background: rgba(255,255,255,.08); margin: 22px 0; }
  .link-btn {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: #78716c;
    text-decoration: none;
    transition: .15s;
  }
  .link-btn:hover { color: #d6d3d1; }
</style>
</head>
<body>
<div class="box">
  <div class="warn-badge">⚙ 緊急提權工具</div>
  <h2>設定我的帳號為管理員</h2>
  <p class="sub">
    當你的帳號被系統自動給了唯讀權限，用這個工具登入後<br>
    直接把自己提升為 <strong style="color:#d97706;">超級管理員 (admin)</strong>。
  </p>

  <div class="step">
    <b>步驟：</b><br>
    1. 輸入你的管理員 Email 與密碼<br>
    2. 點「提升為管理員」<br>
    3. 成功後刪除此檔案，前往正常系統登入
  </div>

  <div class="field">
    <label>EMAIL 帳號</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>密碼</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') doPromote()">
  </div>

  <button class="btn" id="btn" onclick="doPromote()">🔑 提升為超級管理員</button>

  <div class="uid-display" id="uid-display">
    你的 UID：<br><span id="uid-text"></span>
  </div>

  <div id="msg"></div>

  <div class="divider"></div>
  <a href="login.html" class="link-btn">← 返回正常登入頁</a>
</div>

<script type="importmap">
{
  "imports": {
    "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
  }
}
</script>
<script type="module">
import { initializeApp }                              from "firebase/app";
import { getAuth, signInWithEmailAndPassword }        from "firebase/auth";
import { getFirestore, doc, setDoc }                  from "firebase/firestore";

const firebaseConfig = {
  apiKey:            "AIzaSyC-hhAqJM26bYaO_lcA17ERGSU7V1RmlYM",
  authDomain:        "company-system-6ea1a.firebaseapp.com",
  projectId:         "company-system-6ea1a",
  storageBucket:     "company-system-6ea1a.firebasestorage.app",
  messagingSenderId: "865462311535",
  appId:             "1:865462311535:web:033e059bc0e86fa902cb9a"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const msgEl = document.getElementById('msg');
const btn   = document.getElementById('btn');

function showMsg(text, ok) {
  msgEl.textContent = text;
  msgEl.className   = ok ? 'ok' : 'err';
  msgEl.style.display = 'block';
}

window.doPromote = async function() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('pwd').value;
  if (!email || !pwd) { showMsg('請填寫 Email 與密碼', false); return; }

  btn.disabled    = true;
  btn.textContent = '處理中…';
  msgEl.style.display = 'none';

  try {
    // 1. 登入
    const cred = await signInWithEmailAndPassword(auth, email, pwd);
    const uid  = cred.user.uid;

    document.getElementById('uid-display').style.display = 'block';
    document.getElementById('uid-text').textContent = uid;

    // 2. 寫入 admin 職等（merge 保留其他欄位）
    await setDoc(doc(db, 'users', uid), {
      email,
      role:      'admin',
      updatedAt: new Date().toISOString(),
    }, { merge: true });

    showMsg(
      `✅ 成功！帳號「${email}」已設定為超級管理員。\n` +
      `請關閉此頁，刪除 set-admin.html，再重新登入系統。`,
      true
    );
    btn.textContent = '✓ 完成';

  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '🔑 提升為超級管理員';
    const code = e.code || '';
    if (code.includes('wrong-password') || code.includes('invalid-credential')) {
      showMsg('帳號或密碼錯誤，請重新確認。', false);
    } else if (code.includes('user-not-found')) {
      showMsg('找不到此 Email 帳號。', false);
    } else {
      showMsg('失敗：' + e.message, false);
    }
  }
};
</script>
</body>
</html>
