<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — 公司管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { background: #eeeae4; font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .login-box { background: #1c1917; padding: 40px; border-radius: 12px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.3); color: #e7e5e4; }
  .login-box h2 { margin: 0 0 24px; font-weight: 600; text-align: center; font-size: 20px; letter-spacing: 1px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; color: #a8a29e; margin-bottom: 6px; letter-spacing: 1px; }
  .field input { width: 100%; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 6px; color: #fff; padding: 12px; font-size: 13px; outline: none; box-sizing: border-box; transition: .15s; }
  .field input:focus { border-color: #b45309; background: rgba(255,255,255,.1); box-shadow: 0 0 0 3px rgba(180,83,9,.2); }
  .btn-login { width: 100%; background: #b45309; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 10px; transition: .15s; font-family: inherit; }
  .btn-login:hover { background: #d97706; }
  .btn-login:disabled { background: #57534e; cursor: not-allowed; }
  .forgot-pwd { text-align: center; margin-top: 16px; font-size: 11px; color: #a8a29e; cursor: pointer; transition: .15s; }
  .forgot-pwd:hover { color: #e7e5e4; text-decoration: underline; }
  #msg-box { font-size: 12px; text-align: center; margin-top: 14px; display: none; padding: 8px; border-radius: 6px; }
  .msg-err { color: #fca5a5; background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.2); }
  .msg-ok  { color: #34d399;  background: rgba(52,211,153,.1);  border: 1px solid rgba(52,211,153,.2); }
  .loading-bar { height: 2px; background: #b45309; width: 0; transition: width .4s; border-radius: 1px; margin-bottom: 20px; }
  .loading-bar.active { width: 100%; }

  /* 職等徽章預覽（登入成功後短暫顯示） */
  .role-preview {
    display: none; text-align: center; margin-top: 12px;
    font-size: 11px; color: #78716c;
  }
  .role-badge-pill {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500; margin-left: 6px;
    background: rgba(180,83,9,.2); color: #d97706; border: 1px solid rgba(180,83,9,.4);
  }
</style>
</head>
<body>
  <div class="login-box">
    <h2>管理系統登入</h2>
    <div class="loading-bar" id="loading-bar"></div>
    <div class="field">
      <label>EMAIL 帳號</label>
      <input type="email" id="email" placeholder="輸入管理員 Email" autocomplete="email">
    </div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">登入</button>
    <div class="forgot-pwd" onclick="resetPwd()">忘記密碼？</div>
    <div id="msg-box"></div>
    <div class="role-preview" id="role-preview">
      驗證職等中… <span class="role-badge-pill" id="role-preview-badge"></span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "firebase/app":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth":     "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore":"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
  </script>

  <!-- roles.js 必須在 firebase 之前載入（提供 ROLES_CONFIG） -->
  <script src="roles.js"></script>

  <script type="module">
    import { initializeApp }                                     from "firebase/app";
    import { getAuth, signInWithEmailAndPassword,
             sendPasswordResetEmail, onAuthStateChanged }        from "firebase/auth";
    import { getFirestore, doc, getDoc, setDoc }                 from "firebase/firestore";

    const firebaseConfig = {
      apiKey:            "AIzaSyC-hhAqJM26bYaO_lcA17ERGSU7V1RmlYM",
      authDomain:        "company-system-6ea1a.firebaseapp.com",
      projectId:         "company-system-6ea1a",
      storageBucket:     "company-system-6ea1a.firebasestorage.app",
      messagingSenderId: "865462311535",
      appId:             "1:865462311535:web:033e059bc0e86fa902cb9a"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ROLES_CONFIG = window.ROLES_CONFIG;
    const RoleGuard    = window.RoleGuard;

    // 若已登入 → 讀取職等再跳頁
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const role = await fetchRole(user.uid, user.email);
        const allowed = ROLES_CONFIG.pageAccess[role] || [];
        const dest = (allowed.length ? allowed[0] : 'index') + '.html';
        window.location.href = dest;
      }
    });

    /**
     * 從 Firestore users/{uid} 讀取職等
     * 若文件不存在 → 自動建立並給 defaultRole
     */
    async function fetchRole(uid, email) {
      try {
        const ref  = doc(db, 'users', uid);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          return snap.data().role || ROLES_CONFIG.defaultRole;
        } else {
          // 第一次登入：建立文件
          await setDoc(ref, {
            email:     email,
            role:      ROLES_CONFIG.defaultRole,
            createdAt: new Date().toISOString(),
          });
          return ROLES_CONFIG.defaultRole;
        }
      } catch (e) {
        console.warn('fetchRole error', e);
        return ROLES_CONFIG.defaultRole;
      }
    }

    const msgBox   = document.getElementById('msg-box');
    const loginBtn = document.getElementById('login-btn');
    const loadBar  = document.getElementById('loading-bar');

    function showMsg(text, isSuccess = false) {
      msgBox.textContent   = text;
      msgBox.className     = isSuccess ? 'msg-ok' : 'msg-err';
      msgBox.style.display = 'block';
    }

    function setLoading(on) {
      loginBtn.disabled    = on;
      loginBtn.textContent = on ? '登入中…' : '登入';
      loadBar.classList.toggle('active', on);
    }

    window.doLogin = async function () {
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('pwd').value;
      if (!e || !p) { showMsg('請輸入帳號與密碼'); return; }

      setLoading(true);
      msgBox.style.display = 'none';

      try {
        const cred = await signInWithEmailAndPassword(auth, e, p);
        const uid  = cred.user.uid;

        // 讀取職等
        const role     = await fetchRole(uid, e);
        const roleName = (ROLES_CONFIG.roleLabels && ROLES_CONFIG.roleLabels[role]) || role;

        // 顯示職等預覽
        const preview = document.getElementById('role-preview');
        const badge   = document.getElementById('role-preview-badge');
        preview.style.display = 'block';
        badge.textContent = roleName;

        // 存入 session
        const displayName = cred.user.displayName || e.split('@')[0];
        RoleGuard.setSession(uid, role, displayName);

        // 依職等跳轉
        const allowed = ROLES_CONFIG.pageAccess[role] || [];
        const dest    = (allowed.length ? allowed[0] : 'index') + '.html';
        setTimeout(() => { window.location.href = dest; }, 600);

      } catch (err) {
        setLoading(false);
        showMsg('帳號或密碼錯誤，請重新確認。');
      }
    };

    window.resetPwd = function () {
      const e = document.getElementById('email').value.trim();
      if (!e) { showMsg('💡 請先在上方輸入您的 Email，再點「忘記密碼」。'); return; }
      sendPasswordResetEmail(auth, e)
        .then(() => showMsg('✉️ 重設信已發送，請去信箱收信。', true))
        .catch((err) => {
          if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-email') {
            showMsg('找不到此 Email，請確認是否正確。');
          } else {
            showMsg('發送失敗，請稍後再試。');
          }
        });
    };
  </script>
</body>
</html>
